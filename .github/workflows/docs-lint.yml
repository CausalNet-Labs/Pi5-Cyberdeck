name: Docs Lint

on:
  push:
    paths:
      - "docs/**"
      - "templates/**"
      - "README.md"
  pull_request:
    paths:
      - "docs/**"
      - "templates/**"
      - "README.md"

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/markdown-link-check-config.json"

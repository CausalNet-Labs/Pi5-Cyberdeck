<svg width="760" height="1000" viewBox="0 0 380 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Pi 5 cyberdeck assembled layout</title>
<desc>Structural diagram of the finished cyberdeck: an Apache 2800 case containing a display region in the lid, and a keyboard region plus compute stack region in the base, joined by a hinge with a cable service loop, with external 27W USB-C power entering the compute stack.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="380" height="500" fill="#ffffff"/>
<g>
<rect x="40" y="30" width="300" height="410" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="60" y="58" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Apache 2800 case</text>
<text x="60" y="76" text-anchor="start" font-family="sans-serif" font-size="12" fill="#444441">Clamshell, foam removed</text>
</g>
<g>
<rect x="60" y="90" width="260" height="130" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="145" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Display</text>
<text x="190" y="163" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">8" touch, 1280x800</text>
</g>
<line x1="90" y1="230" x2="290" y2="230" stroke="#888780" stroke-width="0.5" stroke-dasharray="3,3"/>
<text x="190" y="248" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Hinge, cable service loop</text>
<g>
<rect x="60" y="265" width="140" height="130" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="130" y="320" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">Keyboard</text>
<text x="130" y="338" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">60% mechanical</text>
</g>
<g>
<rect x="220" y="265" width="100" height="130" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="270" y="320" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Compute</text>
<text x="270" y="338" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Pi 5 stack</text>
</g>
<line x1="270" y1="458" x2="270" y2="440" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="270" y="475" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">27W USB-C power in</text>
</svg>
